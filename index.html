<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>GetCourse Converter</title>
    <style>
      body {
        font-family: -apple-system, sans-serif;
        max-width: 800px;
        margin: 30px auto;
        padding: 20px;
        background: #f0f2f5;
      }
      .converter-section {
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 40px;
        border: 1px solid #e1e4e8;
      }
      h2 {
        margin-top: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
        color: #0088cc;
      }

      .editor {
        width: 100%;
        height: 300px;
        border: 2px solid #ccc;
        background: #fff;
        padding: 15px;
        overflow-y: auto;
        margin-bottom: 15px;
        border-radius: 8px;
        outline: none;
        box-sizing: border-box;
      }
      .editor:focus {
        border-color: #0088cc;
      }

      button {
        color: white;
        border: none;
        padding: 15px;
        cursor: pointer;
        border-radius: 6px;
        font-size: 16px;
        width: 100%;
        font-weight: bold;
        transition: 0.2s;
      }
      .btn-convert {
        background: #0088cc;
      }
      .btn-convert:hover {
        background: #0077b5;
      }
      .btn-clear {
        background: #e74c3c;
        margin-top: 10px;
      }
      .btn-clear:hover {
        background: #c0392b;
      }

      .output {
        width: 100%;
        height: 250px;
        margin-top: 15px;
        display: none;
        font-family: monospace;
        background: #2b2b2b;
        color: #a9ffaf;
        padding: 10px;
        border-radius: 5px;
        box-sizing: border-box;
        white-space: pre-wrap;
      }
      .label {
        font-weight: bold;
        margin-bottom: 8px;
        display: block;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="converter-section">
      <h2>Конвертер</h2>
      <span class="label">Вставьте текст из Google Docs:</span>
      <div id="editor" class="editor" contenteditable="true"></div>
      <button class="btn-convert" onclick="process()">
        СКОПИРОВАТЬ КОД
      </button>
      <textarea id="output" class="output" readonly></textarea>
      <button class="btn-clear" onclick="clearAll()">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <script>
      function clearAll() {
        if (confirm("Вы уверены, что хотите очистить все поля?")) {
          document.getElementById("editor").innerHTML = "";
          document.getElementById("output").value = "";
          document.getElementById("output").style.display = "none";
        }
      }

      function process() {
        const editor = document.getElementById("editor");
        
        const tempContainer = document.createElement("div");
        tempContainer.innerHTML = editor.innerHTML;
        tempContainer.style.position = "fixed";
        tempContainer.style.left = "-9999px";
        document.body.appendChild(tempContainer);

        // 1. Распознаем стили и ссылки
        const allNodes = Array.from(tempContainer.querySelectorAll("*"));
        allNodes.forEach((el) => {
          const style = window.getComputedStyle(el);
          const isLinkColor = style.color === "rgb(17, 85, 204)" || style.color === "rgb(5, 99, 193)";
          const hasUnderline = style.textDecoration.includes("underline");
          
          if (el.tagName === "A") {
            let href = el.getAttribute("href");
            if (href && href.includes("google.com/url?q=")) {
              const urlParams = new URLSearchParams(href.split('?')[1]);
              href = urlParams.get('q') || href;
            }
            while (el.attributes.length > 0) el.removeAttribute(el.attributes[0].name);
            el.setAttribute("href", href);
          } else if (isLinkColor && hasUnderline && el.innerText.trim().length > 3) {
            if (!el.closest("a") && !el.querySelector("a")) {
              const text = el.innerText.trim();
              const link = document.createElement("a");
              link.href = text.startsWith("http") ? text : "#";
              link.innerHTML = el.innerHTML;
              el.innerHTML = "";
              el.appendChild(link);
            }
          }

          const isBold = style.fontWeight === "700" || style.fontWeight === "bold" || parseInt(style.fontWeight) >= 700;
          const isItalic = style.fontStyle === "italic";

          if (isBold && !el.querySelector("b") && el.tagName !== "B") el.innerHTML = "<b>" + el.innerHTML + "</b>";
          if (isItalic && !el.querySelector("i") && el.tagName !== "I") el.innerHTML = "<i>" + el.innerHTML + "</i>";
          if (hasUnderline && !el.querySelector("u") && el.tagName !== "U" && el.tagName !== "A" && !el.closest("a")) {
            el.innerHTML = "<u>" + el.innerHTML + "</u>";
          }
        });

        // 2. Сборка блоков
        const blocks = Array.from(tempContainer.querySelectorAll("p, li, h1, h2, h3, div"));
        let resultArr = [];

        blocks.forEach((block) => {
          if (block.parentElement !== tempContainer && ["P", "LI", "DIV"].includes(block.parentElement.tagName)) return;

          block.querySelectorAll("a").forEach(a => {
            let href = a.getAttribute("href");
            if (href && href.includes("google.com/url?q=")) {
                try { const url = new URL(href); href = url.searchParams.get("q") || href; } catch(e) {}
            }
            while (a.attributes.length > 0) a.removeAttribute(a.attributes[0].name);
            a.setAttribute("href", href);
          });

          let html = block.innerHTML
            .replace(/ style="[^"]*"/g, "")
            .replace(/ class="[^"]*"/g, "")
            .replace(/ id="[^"]*"/g, "")
            .replace(/ dir="[^"]*"/g, "")
            .replace(/<\/?span[^>]*>/g, "")
            .replace(/&nbsp;/g, " ")
            .trim();

          html = html.replace(/<b>\s*<\/b>/g, "").replace(/<u>\s*<\/u>/g, "").replace(/<i>\s*<\/i>/g, "");
          const cleanText = html.replace(/<\/?[^>]+(>|$)/g, "").trim();

          if (cleanText !== "" && html !== "<br>") {
            if (block.tagName === "LI") html = "• " + html;
            resultArr.push({
              html: "<p>" + html + "</p>",
              isStep: /Шаг\s*\d+/i.test(cleanText) || block.tagName === "LI"
            });
          }
        });

        // 3. Сборка с умными разделителями
        let finalResult = [];
        for (let i = 0; i < resultArr.length; i++) {
          finalResult.push(resultArr[i].html);
          if (i < resultArr.length - 1) {
            const currentIsStep = resultArr[i].isStep;
            const nextIsStep = resultArr[i+1].isStep;
            if (!(currentIsStep && nextIsStep)) finalResult.push("<p>&nbsp;</p>");
          }
        }

        document.body.removeChild(tempContainer);
        const output = document.getElementById("output");
        output.value = finalResult.join("\n");
        output.style.display = "block";
        output.select();
        document.execCommand("copy");
      }    </script>
  </body>
</html>
