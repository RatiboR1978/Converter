<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>GetCourse Converter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0e0f14;
        --surface: #16181f;
        --surface2: #1e2029;
        --border: #2a2d3a;
        --email: #4f8ef7;
        --email-dim: #1e2d4a;
        --tg: #29b6f6;
        --tg-dim: #0d2535;
        --danger: #f7604f;
        --text: #e8eaf0;
        --muted: #6b7280;
        --code-bg: #0a0b0f;
        --code-text: #7effa0;
        --success: #4ade80;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 40px 20px;
      }
      .page-header {
        text-align: center;
        margin-bottom: 48px;
      }
      .page-header h1 {
        font-family: "Unbounded", sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .page-header p {
        font-size: 11px;
        color: var(--muted);
        margin-top: 8px;
        letter-spacing: 1px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      @media (max-width: 800px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
      }
      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }
      .card-header .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .card-email .dot {
        background: var(--email);
        box-shadow: 0 0 8px var(--email);
      }
      .card-tg .dot {
        background: var(--tg);
        box-shadow: 0 0 8px var(--tg);
      }
      .card-header h2 {
        font-family: "Unbounded", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .card-email h2 {
        color: var(--email);
      }
      .card-tg h2 {
        color: var(--tg);
      }
      .card-body {
        padding: 20px;
      }
      .label {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
        display: block;
      }
      .editor {
        width: 100%;
        min-height: 200px;
        max-height: 280px;
        background: #afb2c1;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        overflow-y: auto;
        outline: none;
        font-size: 13px;
        line-height: 1.6;
        color: #ffffff;
        transition: border-color 0.2s;
        margin-bottom: 14px;
      }
      .editor:focus {
        border-color: var(--email);
      }
      .card-tg .editor:focus {
        border-color: var(--tg);
      }
      .editor:empty::before {
        content: attr(data-placeholder);
        color: var(--muted);
        pointer-events: none;
      }
      .btn {
        width: 100%;
        padding: 13px 20px;
        border: none;
        border-radius: 10px;
        font-family: "Unbounded", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-email {
        background: var(--email-dim);
        color: var(--email);
        border: 1px solid var(--email);
      }
      .btn-email:hover {
        background: var(--email);
        color: #fff;
        box-shadow: 0 0 20px rgba(79, 142, 247, 0.3);
      }
      .btn-tg {
        background: var(--tg-dim);
        color: var(--tg);
        border: 1px solid var(--tg);
      }
      .btn-tg:hover {
        background: var(--tg);
        color: #fff;
        box-shadow: 0 0 20px rgba(41, 182, 246, 0.3);
      }
      .btn-clear {
        background: transparent;
        color: var(--danger);
        border: 1px solid var(--danger);
        margin-top: 10px;
        opacity: 0.7;
      }
      .btn-clear:hover {
        background: var(--danger);
        color: #fff;
        opacity: 1;
      }
      .output-wrap {
        margin-top: 14px;
        display: none;
      }
      .output-wrap.visible {
        display: block;
      }
      .output-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .copy-status {
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--success);
        opacity: 0;
        transition: opacity 0.3s;
      }
      .copy-status.show {
        opacity: 1;
      }
      textarea.output {
        width: 100%;
        height: 200px;
        background: var(--code-bg);
        color: var(--code-text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        line-height: 1.6;
        resize: vertical;
        outline: none;
        white-space: pre-wrap;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <h1>GetCourse Converter</h1>
      <p>Google Docs → Email &amp; Telegram HTML</p>
    </div>
    <div class="grid">
      <div class="card card-email">
        <div class="card-header">
          <span class="dot"></span>
          <h2>Email (GetCourse)</h2>
        </div>
        <div class="card-body">
          <span class="label">Вставьте текст из Google Docs</span>
          <div
            id="editorEmail"
            class="editor"
            contenteditable="true"
            data-placeholder="Ctrl+V — вставить из Google Docs..."
          ></div>
          <button class="btn btn-email" onclick="processEmail()">
            Скопировать код для Email
          </button>
          <div class="output-wrap" id="wrapEmail">
            <div class="output-header">
              <span class="label" style="margin: 0">Результат</span>
              <span class="copy-status" id="statusEmail">✓ скопировано</span>
            </div>
            <textarea class="output" id="outputEmail" readonly></textarea>
          </div>
        </div>
      </div>
      <div class="card card-tg">
        <div class="card-header">
          <span class="dot"></span>
          <h2>Telegram</h2>
        </div>
        <div class="card-body">
          <span class="label">Вставьте текст из Google Docs</span>
          <div
            id="editorTG"
            class="editor"
            contenteditable="true"
            data-placeholder="Ctrl+V — вставить из Google Docs..."
          ></div>
          <button class="btn btn-tg" onclick="processTG()">
            Скопировать код для Telegram
          </button>
          <div class="output-wrap" id="wrapTG">
            <div class="output-header">
              <span class="label" style="margin: 0">Результат</span>
              <span class="copy-status" id="statusTG">✓ скопировано</span>
            </div>
            <textarea class="output" id="outputTG" readonly></textarea>
          </div>
          <div class="divider"></div>
          <button class="btn btn-clear" onclick="clearAll()">
            Очистить всё
          </button>
        </div>
      </div>
    </div>

    <script>
      // ── ВСТАВКА: перехватываем paste ──────────────────────────────────────────────
      function setupPaste(id) {
        document.getElementById(id).addEventListener("paste", function (e) {
          e.preventDefault();
          var html = e.clipboardData.getData("text/html");
          if (html) {
            this.innerHTML = html;
          } else {
            var text = e.clipboardData.getData("text/plain");
            this.innerHTML = text
              .split("\n")
              .map(function (l) {
                return l.trim() ? "<p>" + l + "</p>" : "<p><br></p>";
              })
              .join("");
          }
        });
      }
      document.addEventListener("DOMContentLoaded", function () {
        setupPaste("editorEmail");
        setupPaste("editorTG");
      });

      // ── УТИЛИТЫ ───────────────────────────────────────────────────────────────────
      function cleanHref(href) {
        if (!href) return "#";
        try {
          if (href.indexOf("google.com/url") !== -1) {
            var u = new URL(href);
            return u.searchParams.get("q") || href;
          }
        } catch (e) {}
        return href;
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
      }

      function showStatus(id) {
        var el = document.getElementById(id);
        el.classList.add("show");
        setTimeout(function () {
          el.classList.remove("show");
        }, 2000);
      }

      function inLink(el) {
        var n = el;
        while (n) {
          if (n.tagName === "A") return true;
          n = n.parentElement;
        }
        return false;
      }

      function getFmt(el) {
        var s = el && el.getAttribute ? el.getAttribute("style") || "" : "";
        return {
          bold: /font-weight\s*:\s*(bold|[789]\d{2})/i.test(s),
          italic: /font-style\s*:\s*italic/i.test(s),
          underline: /text-decoration[^;]*underline/i.test(s),
        };
      }

      // ── КОНВЕРТАЦИЯ УЗЛА В HTML ───────────────────────────────────────────────────
      function toHtml(node, inh) {
        // Текстовый узел
        if (node.nodeType === 3) {
          var t = node.textContent.replace(/\u00A0/g, " ");
          if (!t) return "";
          if (!inLink(node.parentElement))
            t = t.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1">$1</a>');
          return t;
        }
        if (node.nodeType !== 1) return "";
        var tag = node.tagName.toUpperCase();
        if (
          tag === "STYLE" ||
          tag === "SCRIPT" ||
          tag === "META" ||
          tag === "LINK"
        )
          return "";
        if (tag === "BR") return "";

        // Ссылка
        if (tag === "A") {
          var href = cleanHref(node.getAttribute("href"));
          var inner = childHtml(node, inh);
          return inner.trim() ? '<a href="' + href + '">' + inner + "</a>" : "";
        }

        var f = getFmt(node);
        var bold = f.bold || inh.bold || tag === "B" || tag === "STRONG";
        var ital = f.italic || inh.italic || tag === "I" || tag === "EM";
        var undr = f.underline || inh.underline || tag === "U";

        var res = childHtml(node, {
          bold: bold,
          italic: ital,
          underline: undr,
        });
        if (!res.trim()) return "";
        if (undr && !inh.underline && !inLink(node)) res = "<u>" + res + "</u>";
        if (ital && !inh.italic) res = "<i>" + res + "</i>";
        if (bold && !inh.bold) res = "<b>" + res + "</b>";
        return res;
      }

      function childHtml(node, fmt) {
        var r = "";
        for (var i = 0; i < node.childNodes.length; i++)
          r += toHtml(node.childNodes[i], fmt);
        return r;
      }

      var NO_FMT = { bold: false, italic: false, underline: false };

      // ── ПОЛУЧИТЬ МАССИВ БЛОКОВ (абзацы + пункты списка) ─────────────────────────
      function getBlocks(editorEl) {
        var clone = editorEl.cloneNode(true);
        var result = [];

        function walk(node) {
          if (node.nodeType !== 1) return;
          var tag = node.tagName.toUpperCase();
          if (tag === "UL" || tag === "OL") {
            for (var i = 0; i < node.childNodes.length; i++) {
              var child = node.childNodes[i];
              if (
                child.nodeType === 1 &&
                child.tagName.toUpperCase() === "LI"
              ) {
                var html = childHtml(child, NO_FMT).trim();
                if (html && html !== "&nbsp;" && html !== "\u00A0")
                  result.push({ type: "li", content: html });
              }
            }
          } else if (tag === "P") {
            var html = childHtml(node, NO_FMT).trim();
            result.push({
              type: "p",
              content:
                !html ||
                html === "&nbsp;" ||
                html === "\u00A0" ||
                html === "<br>"
                  ? null
                  : html,
            });
          } else {
            for (var i = 0; i < node.childNodes.length; i++)
              walk(node.childNodes[i]);
          }
        }

        for (var i = 0; i < clone.childNodes.length; i++)
          walk(clone.childNodes[i]);

        // Fallback: нет блоков — разбиваем по <br>
        if (!result.length) {
          var cur = "";
          for (var j = 0; j < clone.childNodes.length; j++) {
            var n = clone.childNodes[j];
            if (n.nodeType === 1 && n.tagName === "BR") {
              result.push({ type: "p", content: cur.trim() || null });
              cur = "";
            } else {
              cur += toHtml(n, NO_FMT);
            }
          }
          if (cur.trim()) result.push({ type: "p", content: cur.trim() });
        }

        // Убрать null по краям
        while (result.length && result[0].content === null) result.shift();
        while (result.length && result[result.length - 1].content === null)
          result.pop();
        return result;
      }

      // ── EMAIL ─────────────────────────────────────────────────────────────────────
      function processEmail() {
        var blocks = getBlocks(document.getElementById("editorEmail"));
        if (!blocks.length) return;

        var lines = [];
        var inList = false;
        var needSep = false;

        for (var i = 0; i < blocks.length; i++) {
          var b = blocks[i];
          if (b.type === "li") {
            if (!inList) {
              if (needSep) { lines.push("<p><br></p>"); needSep = false; }
              lines.push("<ul>");
              inList = true;
            }
            lines.push("<li>" + b.content + "</li>");
          } else {
            if (inList) {
              lines.push("</ul>");
              inList = false;
              needSep = true;
            }
            if (b.content === null) {
              needSep = true;
            } else {
              if (needSep) lines.push("<p><br></p>");
              lines.push("<p>" + b.content + "</p>");
              needSep = true;
            }
          }
        }
        if (inList) lines.push("</ul>");

        var result = lines.join("\n");
        document.getElementById("outputEmail").value = result;
        document.getElementById("wrapEmail").classList.add("visible");
        copyText(result).then(function () {
          showStatus("statusEmail");
        });
      }

      // ── TELEGRAM ──────────────────────────────────────────────────────────────────
      function processTG() {
        var blocks = getBlocks(document.getElementById("editorTG"));
        if (!blocks.length) return;

        var lines = [];
        var inList = false;
        var needSep = false;

        for (var i = 0; i < blocks.length; i++) {
          var b = blocks[i];
          if (b.type === "li") {
            if (!inList) {
              if (needSep) { lines.push("<p>&nbsp;</p>"); needSep = false; }
              inList = true;
            }
            lines.push("<p>• " + b.content + "</p>");
          } else {
            if (inList) {
              inList = false;
              needSep = true;
            }
            if (b.content === null) {
              needSep = true;
            } else {
              if (needSep) lines.push("<p>&nbsp;</p>");
              lines.push("<p>" + b.content + "</p>");
              needSep = true;
            }
          }
        }

        var result = lines.join("\n");
        document.getElementById("outputTG").value = result;
        document.getElementById("wrapTG").classList.add("visible");
        copyText(result).then(function () {
          showStatus("statusTG");
        });
      }

      // ── ОЧИСТКА ───────────────────────────────────────────────────────────────────
      function clearAll() {
        if (!confirm("Очистить все поля?")) return;
        ["editorEmail", "editorTG"].forEach(function (id) {
          document.getElementById(id).innerHTML = "";
        });
        ["outputEmail", "outputTG"].forEach(function (id) {
          document.getElementById(id).value = "";
        });
        ["wrapEmail", "wrapTG"].forEach(function (id) {
          document.getElementById(id).classList.remove("visible");
        });
      }
    </script>
  </body>
</html>
